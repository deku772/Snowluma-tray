<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SnowLuma 托盘 - 首次设置</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 40px;
      max-width: 500px;
      width: 100%;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .logo {
      text-align: center;
      margin-bottom: 30px;
    }
    .logo-icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #1E90FF, #4169E1);
      border-radius: 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      font-weight: bold;
      margin-bottom: 15px;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #888;
      font-size: 14px;
    }
    .version {
      color: #1E90FF;
      font-size: 12px;
      margin-top: 5px;
    }
    .options {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-top: 30px;
    }
    .option {
      background: rgba(255,255,255,0.05);
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 20px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .option:hover {
      border-color: #1E90FF;
      background: rgba(30,144,255,0.1);
    }
    .option.active {
      border-color: #1E90FF;
      background: rgba(30,144,255,0.15);
    }
    .option-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }
    .option-icon {
      font-size: 24px;
    }
    .option-title {
      font-size: 16px;
      font-weight: 600;
    }
    .option-desc {
      color: #888;
      font-size: 13px;
      margin-left: 36px;
    }
    .progress-section {
      margin-top: 25px;
      display: none;
    }
    .progress-section.show { display: block; }
    .progress-bar {
      height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 10px;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #1E90FF, #4169E1);
      border-radius: 3px;
      transition: width 0.3s;
      width: 0%;
    }
    .progress-text {
      font-size: 13px;
      color: #888;
      text-align: center;
    }
    .error-box {
      background: rgba(255,82,82,0.1);
      border: 1px solid rgba(255,82,82,0.3);
      border-radius: 8px;
      padding: 15px;
      margin-top: 15px;
      display: none;
    }
    .error-box.show { display: block; }
    .error-box .title {
      color: #ff5252;
      font-weight: 600;
      margin-bottom: 5px;
    }
    .error-box .msg { color: #888; font-size: 13px; }
    .btn-row {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }
    .btn {
      flex: 1;
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #1E90FF, #4169E1);
      color: #fff;
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-secondary {
      background: rgba(255,255,255,0.1);
      color: #fff;
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.15); }
    .tip {
      margin-top: 25px;
      padding: 15px;
      background: rgba(30,144,255,0.1);
      border-radius: 8px;
      font-size: 13px;
      color: #888;
    }
    .tip strong { color: #1E90FF; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <div class="logo-icon">Q</div>
      <h1>欢迎使用 SnowLuma 托盘</h1>
      <div class="subtitle">首次设置向导</div>
      <div class="version" id="trayVersion">托盘版本: v1.2.0</div>
    </div>

    <div id="optionsSection">
      <div class="options">
        <!-- 自动下载选项 -->
        <div class="option" id="optionAuto" onclick="selectOption('auto')">
          <div class="option-header">
            <span class="option-icon">🚀</span>
            <span class="option-title">快速下载（推荐）</span>
          </div>
          <div class="option-desc">自动从 GitHub 下载最新版 SnowLuma 并解压</div>
        </div>

        <!-- 手动选择选项 -->
        <div class="option" id="optionManual" onclick="selectOption('manual')">
          <div class="option-header">
            <span class="option-icon">📁</span>
            <span class="option-title">手动选择目录</span>
          </div>
          <div class="option-desc">你已经下载过 SnowLuma，选择所在文件夹</div>
        </div>
      </div>

      <div class="tip">
        <strong>提示：</strong>首次安装后，请在 WebUI 中扫码登录你的 QQ 账号
      </div>

      <div class="btn-row" id="btnRow">
        <button class="btn btn-primary" id="nextBtn" disabled onclick="doNext()">下一步</button>
        <button class="btn btn-secondary" id="cancelBtn" onclick="window.close()">取消</button>
      </div>

      <!-- 手动模式下打开文件夹的按钮 -->
      <div class="btn-row" id="manualBtnRow" style="display:none;">
        <button class="btn btn-primary" id="selectDirBtn" onclick="selectDirectory()">选择文件夹</button>
        <button class="btn btn-secondary" onclick="cancelManual()">取消</button>
      </div>
    </div>

    <!-- 下载进度 -->
    <div class="progress-section" id="progressSection">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-text" id="progressText">准备下载...</div>
    </div>

    <!-- 错误提示 -->
    <div class="error-box" id="errorBox">
      <div class="title">下载失败</div>
      <div class="msg" id="errorMsg"></div>
    </div>

    <!-- 成功提示 -->
    <div id="successSection" style="display:none; text-align:center;">
      <div style="font-size:60px;margin-bottom:20px;">✅</div>
      <h2 style="margin-bottom:10px;">设置完成！</h2>
      <p style="color:#888;margin-bottom:20px;">SnowLuma 正在启动...</p>
      <p style="color:#888;font-size:13px;">请访问 <strong style="color:#1E90FF;">http://localhost:5099</strong> 扫码登录 QQ</p>
    </div>
  </div>

  <script>
    let selectedOption = null;
    let selectedDir = null;

    function selectOption(opt) {
      selectedOption = opt;
      document.querySelectorAll('.option').forEach(el => el.classList.remove('active'));
      document.getElementById('option' + (opt === 'auto' ? 'Auto' : 'Manual')).classList.add('active');
      document.getElementById('nextBtn').disabled = false;

      if (opt === 'manual') {
        document.getElementById('btnRow').style.display = 'none';
        document.getElementById('manualBtnRow').style.display = 'flex';
      } else {
        document.getElementById('btnRow').style.display = 'flex';
        document.getElementById('manualBtnRow').style.display = 'none';
      }
    }

    function cancelManual() {
      selectedOption = null;
      document.querySelectorAll('.option').forEach(el => el.classList.remove('active'));
      document.getElementById('nextBtn').disabled = true;
      document.getElementById('btnRow').style.display = 'flex';
      document.getElementById('manualBtnRow').style.display = 'none';
    }

    async function selectDirectory() {
      const result = await window.electronAPI.selectDirectory();
      if (result.success && result.path) {
        selectedDir = result.path;
        document.getElementById('nextBtn').disabled = false;
        document.getElementById('optionManual').querySelector('.option-desc').textContent = 
          '已选择: ' + result.path;
      }
    }

    async function doNext() {
      if (!selectedOption) return;

      const btn = document.getElementById('nextBtn');
      btn.disabled = true;
      btn.textContent = '处理中...';

      try {
        if (selectedOption === 'auto') {
          await autoDownload();
        } else {
          await useManualDirectory();
        }
      } catch (err) {
        showError(err.message || '操作失败');
        btn.disabled = false;
        btn.textContent = '重试';
      }
    }

    async function autoDownload() {
      document.getElementById('optionsSection').style.display = 'none';
      const progressSection = document.getElementById('progressSection');
      progressSection.classList.add('show');

      const setProgress = (pct, text) => {
        document.getElementById('progressFill').style.width = pct + '%';
        document.getElementById('progressText').textContent = text;
      };

      try {
        setProgress(10, '获取下载链接...');
        
        // 获取最新版本和下载链接
        const latestInfo = await window.electronAPI.getLatestSnowluma();
        if (!latestInfo.version || !latestInfo.downloadUrl) {
          throw new Error('无法获取最新版本信息');
        }

        setProgress(20, `发现新版本 v${latestInfo.version}，开始下载...`);

        // 下载 zip
        await window.electronAPI.downloadSnowluma(latestInfo.downloadUrl, (progress) => {
          setProgress(20 + progress * 0.7, `下载中 ${Math.round(progress * 100)}%`);
        });

        setProgress(95, '解压中...');

        // 解压
        const installDir = await window.electronAPI.extractSnowluma();
        
        setProgress(100, '完成！');
        
        // 启动
        await window.electronAPI.startSnowluma(installDir);
        
        showSuccess();
      } catch (err) {
        throw err;
      }
    }

    async function useManualDirectory() {
      if (!selectedDir) {
        throw new Error('请先选择目录');
      }

      document.getElementById('optionsSection').style.display = 'none';
      document.getElementById('progressSection').classList.add('show');
      document.getElementById('progressFill').style.width = '50%';
      document.getElementById('progressText').textContent = '验证目录...';

      try {
        const result = await window.electronAPI.setSnowlumaDir(selectedDir);
        if (!result.success) {
          throw new Error(result.error || '目录无效');
        }

        await window.electronAPI.startSnowluma(selectedDir);
        showSuccess();
      } catch (err) {
        throw err;
      }
    }

    function showError(msg) {
      const box = document.getElementById('errorBox');
      box.classList.add('show');
      document.getElementById('errorMsg').textContent = msg;
    }

    function showSuccess() {
      document.getElementById('optionsSection').style.display = 'none';
      document.getElementById('progressSection').classList.remove('show');
      document.getElementById('successSection').style.display = 'block';
    }

    // 初始化
    window.electronAPI.getTrayVersion().then(version => {
      document.getElementById('trayVersion').textContent = '托盘版本: v' + version;
    });
  </script>
</body>
</html>
