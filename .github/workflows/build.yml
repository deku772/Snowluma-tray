name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: src
        run: npm ci

      - name: Build (TypeScript compile)
        working-directory: src
        run: npm run build

      - name: Package portable exe (+ generate latest.yml)
        working-directory: src
        run: npm run dist

      # 每次 push 到 main 都验证能正常打包，产物作为 artifact 留存
      - name: Upload artifact (main push only)
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: SnowLumaTray-latest
          path: dist/SnowLumaTray.exe
          retention-days: 30

      # 推送 tag (v1.0.1 等) 时发布正式 Release，供 OTA 使用
      - name: Release (tag push only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/SnowLumaTray.exe
            dist/latest.yml
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
